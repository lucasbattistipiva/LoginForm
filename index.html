<!DOCTYPE html>
<html lang="en-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=0">
    <link rel="stylesheet" href="assets/css/template.css">
    <title>Formulário</title>
</head>

<body>
    <div class="container">
        <main>
            <form action="">
                <div class="title-login">
                    <h1 class="login-name">LOGIN</h1>
                    <div class="login-bar"></div>
                </div>
                
                <input type="email" placeholder="EMAIL" minlength="12"  autofocus required>
                <input type="password" placeholder="SENHA" minlength="8" required>
                <input type="text" placeholder="USERNAME" minlength="3" required>
                <input type="text" placeholder="NOME" minlength="3" required>
                <input type="text" placeholder="SOBRENOME" minlength="4" required>
                <input type="text" placeholder="CPF" minlength="11" required>
                <p>Sem cadastro? <a href="">Clique aqui</a></p>
                <div class="checkbox-terms">
                    <input type="checkbox" id="terms" required>
                    <label for="#terms">Li e aceito os <a href="">Termos de condição</a><span class="priority">*</span></label>
                </div>
                
                <input type="submit" value="Login">
            </form>
        </main>

    </div>

</body>

</html>
